<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#070b14" />
    <title>MedHistory — Body</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="device">
      <div class="dynamic-island"></div>
      <div class="home-indicator"></div>
      <div class="phone">
      <header class="app-header">
        <button class="back-btn" onclick="window.location.href='index.html'">‹</button>
        <div style="flex:1">
          <h1 id="user-name">—</h1>
          <div class="subtitle" id="user-sub">Tap a marker</div>
        </div>
      </header>

      <div class="body-wrap">
        <div class="view-toggle" role="tablist">
          <button id="view-front" class="active" type="button">Front</button>
          <button id="view-back" type="button">Back</button>
        </div>

        <div class="body-hint">Glowing markers indicate logged history</div>

        <svg
          class="body-svg"
          id="body-svg"
          viewBox="0 0 206.326 206.326"
          xmlns="http://www.w3.org/2000/svg"
          aria-label="Body diagram"
        ></svg>

        <div class="body-label" id="body-label"></div>
      </div>
      </div>
    </div>

    <script src="app.js"></script>

        return `<path class="outline" d="${SILHOUETTE}"/>`;
      }

      // ---- Dot positions (viewBox 206.326 x 206.326) ----

        { part: "ear-left",       cx:  88, cy: 15 },

        { part: "eye-right",      cx: 108, cy: 13 },
        { part: "ear-right",      cx: 119, cy: 15 },
        { part: "mouth",          cx: 103, cy: 24 },

        { part: "shoulder-left",  cx:  82, cy: 42 },
        { part: "shoulder-right", cx: 124, cy: 42 },

        { part: "chest",          cx: 103, cy: 55 },

        { part: "stomach",        cx: 103, cy: 88 },

        { part: "thigh-left",     cx:  96, cy: 132 },

      const BACK_DOTS = [
        { part: "ear-left",       cx:  88, cy: 15 },
        { part: "ear-right",      cx: 119, cy: 15 },

        { part: "elbow-left",     cx:  79, cy: 74 },
        { part: "elbow-right",    cx: 127, cy: 74 },
        { part: "forearm-left",   cx:  72, cy: 88 },
        { part: "forearm-right",  cx: 134, cy: 88 },
        { part: "wrist-left",     cx:  71, cy: 102 },
        { part: "wrist-right",    cx: 135, cy: 102 },
        { part: "hand-left",      cx:  70, cy: 114 },
        { part: "hand-right",     cx: 136, cy: 114 },

        { part: "hamstring-left", cx:  96, cy: 132 },
        { part: "hamstring-right",cx: 110, cy: 132 },
        { part: "knee-left",      cx:  95, cy: 153 },
        { part: "knee-right",     cx: 111, cy: 153 },
        { part: "calf-left",      cx:  94, cy: 174 },
        { part: "calf-right",     cx: 112, cy: 174 },
        { part: "ankle-left",     cx:  96, cy: 190 },
        { part: "ankle-right",    cx: 110, cy: 190 },
        { part: "foot-left",      cx:  95, cy: 202 },
        { part: "foot-right",     cx: 111, cy: 202 },
      ];

      function isPartActive(partId) {
        const e = Store.getEntries(userId, partId);
        return (
          e.visits.length > 0 ||
          e.notes.length > 0 ||
          e.prescriptions.length > 0 ||
          e.imaging.length > 0
        );
      }

      function dotsSvg(dots) {
        return dots
          .map((d) => {
            const active = isPartActive(d.part);
            const cls = active ? "dot dot--active" : "dot";
            return `<circle class="${cls}" cx="${d.cx}" cy="${d.cy}" r="2" data-part="${d.part}"/>`;
          })
          .join("");
      }

      const svg = document.getElementById("body-svg");
      const label = document.getElementById("body-label");
      const viewFront = document.getElementById("view-front");
      const viewBack = document.getElementById("view-back");

      let currentView = "front";

      function render() {
        const dots = currentView === "front" ? FRONT_DOTS : BACK_DOTS;
        svg.innerHTML = silhouette() + dotsSvg(dots);
        bindDots();
      }

      function bindDots() {
        svg.querySelectorAll(".dot").forEach((el) => {
          const part = el.getAttribute("data-part");
          el.addEventListener("mouseenter", () => showLabel(part));
          el.addEventListener("mouseleave", hideLabel);
          el.addEventListener("click", () => {
            window.location.href = `part.html?user=${userId}&part=${part}`;
          });
        });
      }

      function showLabel(part) {
        label.textContent = PART_LABELS[part] || part;
        label.classList.add("visible");
      }
      function hideLabel() {
        label.classList.remove("visible");
      }

      viewFront.addEventListener("click", () => {
        currentView = "front";
        viewFront.classList.add("active");
        viewBack.classList.remove("active");
        render();
      });
      viewBack.addEventListener("click", () => {
        currentView = "back";
        viewBack.classList.add("active");
        viewFront.classList.remove("active");
        render();
      });

      render();
    </script>
  </body>
</html>
